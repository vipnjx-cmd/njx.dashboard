<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Login | Painel Rolex NJX</title>
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: #020617;
            --border-subtle: #1e293b;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.15);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --danger: #f97373;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            padding: 24px 26px 22px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.75);
        }

        .login-title {
            margin: 0 0 4px 0;
            font-size: 18px;
            font-weight: 600;
        }

        .login-sub {
            margin: 0 0 16px 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #020617;
            border-radius: 8px;
            border: 1px solid #1f2937;
            color: var(--text-main);
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        .field {
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            margin-top: 6px;
            border-radius: 999px;
            border: none;
            font-size: 14px;
            padding: 9px 16px;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            font-weight: 500;
            transition: background 0.15s ease, transform 0.05s ease;
        }

            button:hover {
                transform: translateY(-0.5px);
            }

            button:active {
                transform: translateY(0.5px) scale(0.99);
            }

        .login-msg {
            margin-top: 10px;
            font-size: 12px;
            min-height: 16px;
        }

            .login-msg.error {
                color: var(--danger);
            }

            .login-msg.success {
                color: #4ade80;
            }

        .login-footer {
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        .remember-row {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

            .remember-row input {
                margin: 0;
            }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Painel Rolex NJX</h1>
        <p class="login-sub">Login de administrador</p>

        <form id="login-form">
            <div class="field">
                <label for="username">Usuario</label>
                <input id="username" type="text" autocomplete="username" required />
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <input id="password" type="password" autocomplete="current-password" required />
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember" />
                <label for="remember">Salvar login neste dispositivo</label>
            </div>

            <button id="btn-login" type="submit">Entrar</button>

            <div id="login-msg" class="login-msg"></div>
        </form>

        <div class="login-footer">
            Acesso restrito ao time NJX.
        </div>
    </div>

    <script src="./login.js"></script>
</body>
</html>
